---
groups:
- name: bosh-alicloud-cpi
  jobs:
  - build-candidate
  - integration
  - bats
  - end-2-end
  - promote-candidate

shared:
- &prepare-director
  task: prepare-director
  file: pipelines/shared/tasks/prepare-director.yml
  params: &prepare-director-params
    INFRASTRUCTURE:     alicloud
    DIRECTOR_VARS_FILE: {{alicloud_director_vars_file}}

- &deploy-director
  task: deploy-director
  file: pipelines/shared/tasks/deploy-director.yml

- &run-bats
  task: run-bats
  file: pipelines/shared/tasks/run-bats.yml
  params:
    INFRASTRUCTURE:     alicloud
    STEMCELL_NAME:      bosh-alicloud-kvm-ubuntu-noble
    BAT_INFRASTRUCTURE: alicloud
    BAT_NETWORKING:     manual
    BAT_RSPEC_FLAGS:    "--tag ~multiple_manual_networks --tag ~raw_ephemeral_storage"

- &run-end-2-end
  task: run-e2e
  file: bosh-cpi-src/ci/tasks/run-e2e.yml
  params:
    ALICLOUD_ACCESS_KEY_ID:              {{alicloud_access_key__primary}}
    ALICLOUD_SECRET_ACCESS_KEY:          {{alicloud_secret_key__primary}}

- &put-environment
  task: put-environment
  file: bosh-cpi-src/ci/tasks/put-environment.yml
  params: &put-environment-params
    access_key: {{alicloud_access_key__primary}}
    secret_key: {{alicloud_secret_key__primary}}
    region:     {{alicloud_region__primary}}
    terraform_role_arn: {{terraform_role_arn}}
    remote_state_access_key: {{terraform_backend_access_key}}
    remote_state_secret_key: {{terraform_backend_secret_key}}
    remote_state_bucket:     {{terraform_backend_bucket}}
    remote_state_region:     {{terraform_backend_region}}
    remote_state_file_path:  "bosh-alicloud-cpi-state"
    public_key: ((PUBLIC_KEY))

- &ensure-terminated
  task: ensure-terminated
  file: bosh-cpi-src/ci/tasks/ensure-terminated.yml
  params:
    ALICLOUD_ACCESS_KEY_ID:     {{alicloud_access_key__primary}}
    ALICLOUD_ACCESS_KEY_SECRET: {{alicloud_secret_key__primary}}
    ALICLOUD_DEFAULT_REGION:    {{alicloud_region__primary}}

- &teardown
  task: teardown
  file: pipelines/shared/tasks/teardown.yml

- &patch-director-size
  task: patch-director-size
  config:
    platform: linux
    image_resource:
      type: docker-image
      source: {repository: bosh/integration, tag: main}
    inputs:
      - name: bosh-deployment
    outputs:
      - name: bosh-deployment
    run:
      path: bash
      args:
        - -c
        - |
          cat > bosh-deployment/director-instance-type.yml <<'EOF'
          - path: /resource_pools/name=vms/cloud_properties/instance_type
            type: replace
            value: ecs.g6.xlarge
          EOF

# Alibaba Cloud EIPs don't support hairpin NAT: the Director VM cannot
# reach its own EIP from inside.  The bosh-cpi-certification deploy-director
# task sets both BOSH_ENVIRONMENT and BOSH_ALL_PROXY to the EIP, so the
# SOCKS5 proxy on the Director tries to forward to EIP:25555 and times out.
# Fix: rewrite BOSH_ENVIRONMENT to the internal IP so the SOCKS forward
# stays local, while keeping the SSH tunnel endpoint on the EIP.
- &patch-director-env
  task: patch-director-env
  config:
    platform: linux
    image_resource:
      type: docker-image
      source: {repository: bosh/integration, tag: main}
    inputs:
      - name: director-state
      - name: environment
    outputs:
      - name: director-state
    run:
      path: bash
      args:
        - -c
        - |
          set -euo pipefail
          internal_ip=$(python3 -c "import json; print(json.load(open('environment/metadata'))['internal_ip'])")
          echo "Patching BOSH_ENVIRONMENT from EIP to internal IP: ${internal_ip}"
          sed -i "s|^export BOSH_ENVIRONMENT=.*|export BOSH_ENVIRONMENT=\"${internal_ip}\"|" \
            director-state/director.env
          echo "--- patched director.env ---"
          cat director-state/director.env

# Alibaba Cloud cloud_efficiency disks have a 20 GB minimum (enforced by
# the CPI in action/disks.go AmendSmallDiskSize, since 2017).  Two upstream
# BATS tests create disks < 20 GB and assert on the exact byte-size, so they
# always fail on alicloud.  Inject `skip` with an explanation so they appear
# as *pending* instead of *failed*.
- &patch-bats
  task: patch-bats
  config:
    platform: linux
    image_resource:
      type: docker-image
      source: {repository: bosh/integration, tag: main}
    inputs:
      - name: bats
    outputs:
      - name: bats
    run:
      path: bash
      args:
        - -c
        - |
          set -euo pipefail
          REASON="Alibaba Cloud cloud_efficiency disks have a 20 GB minimum size. "\
          "The CPI auto-amends smaller requests to 20 GB (AmendSmallDiskSize), "\
          "so byte-size assertions for < 20 GB disks will never match."

          echo "=== Patching BATS: skipping tests incompatible with Alibaba Cloud disk constraints ==="

          # 1. persistent_disks_spec.rb – "attaches multiple disks"
          #    Creates 5 GB + 4 GB disks, expects exact lsblk byte sizes.
          #    Both disks are silently upsized to 20 GB, failing the assertion.
          echo "  [skip] persistent_disks_spec.rb: 'attaches multiple disks'"
          sed -i "s|it 'attaches multiple disks'|it 'attaches multiple disks', skip: '${REASON}'|" \
            bats/spec/system/persistent_disks_spec.rb

          # 2. with_release_stemcell_spec.rb – "should migrate disk contents"
          #    Resizes from 2 GB to 4 GB; both are upsized to 20 GB so
          #    the size comparison (before != after) always fails.
          echo "  [skip] with_release_stemcell_spec.rb: 'should migrate disk contents'"
          sed -i "s|it 'should migrate disk contents'|it 'should migrate disk contents', skip: '${REASON}'|" \
            bats/spec/system/with_release_stemcell_spec.rb

          echo "=== Done. Skipped tests will appear as pending in rspec output. ==="

jobs:
- name: build-candidate
  serial: true
  plan:
  - in_parallel:
    - {get: bosh-cpi-src,   trigger: true,  resource: bosh-cpi-src-in}
    - {get: version-semver, trigger: false, params: {bump: patch}}
    - {get: bosh-cli,       trigger: false}
  - put: version-semver
    params: {file: version-semver/number}
  - task: build
    file: bosh-cpi-src/ci/tasks/build-candidate.yml
  - put: bosh-cpi-dev-artifacts
    params: {file: candidate/*.tgz}

- name: integration
  serial: true
  plan:
  - in_parallel:
    - {get: bosh-cpi-release, trigger: true,  resource: bosh-cpi-dev-artifacts, passed: [build-candidate]}
    - {get: bosh-cpi-src,     trigger: false, resource: bosh-cpi-src-in, passed: [build-candidate]}
    - {get: stemcell,         trigger: false, resource: ubuntu-noble-stemcell}
    - {get: aliyun-cli,       trigger: false, resource: aliyun-cli}
    - {get: jq-blob,          trigger: false}
    - {get: one-day,              trigger: false}
  - <<: *put-environment
    params:
      <<: *put-environment-params
      env_name: bosh-alicloud-cpi-integration
      delete_on_failure: true
      terraform_source: bosh-cpi-src/ci/assets/terraform
  - task: test
    file: bosh-cpi-src/ci/tasks/run-integration.yml
    params:
      ALICLOUD_ACCESS_KEY_ID:     {{alicloud_access_key__primary}}
      ALICLOUD_ACCESS_KEY_SECRET: {{alicloud_secret_key__primary}}
    ensure:
      do:
        - <<: *ensure-terminated
        - <<: *put-environment
          params:
            <<: *put-environment-params
            env_name: bosh-alicloud-cpi-integration
            action: destroy
            terraform_source: bosh-cpi-src/ci/assets/terraform

- name: bats
  serial: true
  plan:
  - in_parallel:
    - {get: cpi-release,     trigger: true,  resource: bosh-cpi-dev-artifacts, passed: [build-candidate]}
    - {get: bosh-release,    trigger: false, resource: bosh-release}
    - {get: bosh-cpi-src,    trigger: false, resource: bosh-cpi-src-in, passed: [build-candidate]}
    - {get: stemcell,        trigger: false, resource: ubuntu-noble-light-stemcell}
    - {get: bosh-deployment, trigger: false}
    - {get: pipelines,       trigger: false}
    - {get: bosh-cli,        trigger: false}
    - {get: bats,            trigger: false}
    - {get: one-day,             trigger: false}
    - {get: jq-blob,         trigger: false}
    - {get: aliyun-cli,      trigger: false, resource: aliyun-cli}
  - <<: *put-environment
    params:
      <<: *put-environment-params
      env_name: bosh-alicloud-cpi-bats
      delete_on_failure: true
      terraform_source: bosh-cpi-src/ci/assets/terraform
  - do:
    - <<: *patch-director-size
    - <<: *prepare-director
      params:
        <<: *prepare-director-params
        OPTIONAL_OPS_FILE:  |
          -o pipelines/shared/assets/ops/remove-hm.yml
          -o bosh-deployment/external-ip-with-registry-not-recommended.yml
          -o pipelines/shared/assets/ops/remove-provider-cert.yml
          -o bosh-deployment/director-instance-type.yml
    - do:
        - <<: *deploy-director
        - <<: *patch-director-env
        - <<: *patch-bats
        - <<: *run-bats
      ensure:
        do:
          - <<: *teardown
          - <<: *ensure-terminated
    ensure:
      do:
        - <<: *put-environment
          params:
            <<: *put-environment-params
            env_name: bosh-alicloud-cpi-bats
            action: destroy
            terraform_source: bosh-cpi-src/ci/assets/terraform

- name: end-2-end
  serial: true
  plan:
  - in_parallel:
    - {get: cpi-release,     trigger: true,  resource: bosh-cpi-dev-artifacts,   passed: [build-candidate]}
    - {get: bosh-release,    trigger: false, resource: bosh-release}
    - {get: bosh-cpi-src,    trigger: false, resource: bosh-cpi-src-in,          passed: [build-candidate]}
    - {get: stemcell,        trigger: false, resource: ubuntu-noble-light-stemcell}
    - {get: heavy-stemcell,  trigger: false, resource: ubuntu-noble-stemcell}
    - {get: bosh-deployment, trigger: false}
    - {get: pipelines,       trigger: false}
    - {get: bosh-cli,        trigger: false}
    - {get: one-day,             trigger: false}
    - {get: jq-blob,         trigger: false}
    - {get: aliyun-cli,      trigger: false, resource: aliyun-cli}
  - <<: *put-environment
    params:
      <<: *put-environment-params
      env_name: bosh-alicloud-cpi-end-2-end
      delete_on_failure: true
      terraform_source: bosh-cpi-src/ci/assets/terraform
  - do:
    - <<: *patch-director-size
    - <<: *prepare-director
      params:
        <<: *prepare-director-params
        OPTIONAL_OPS_FILE:  |
          -o bosh-deployment/external-ip-with-registry-not-recommended.yml
          -o pipelines/shared/assets/ops/remove-provider-cert.yml
          -o bosh-deployment/director-instance-type.yml
#              -o pipelines/alicloud/assets/ops/ram-instance-profile-ops-file.yml
    - do:
        - <<: *deploy-director
        - <<: *patch-director-env
        - <<: *run-end-2-end
      ensure:
        do:
          - <<: *teardown
          - <<: *ensure-terminated
    ensure:
      do:
        - <<: *put-environment
          params:
            <<: *put-environment-params
            env_name: bosh-alicloud-cpi-end-2-end
            action: destroy
            terraform_source: bosh-cpi-src/ci/assets/terraform

- name: promote-candidate
  plan:
  - in_parallel:
    - {get: bosh-cpi-release,       trigger: false, resource: bosh-cpi-dev-artifacts, passed: [end-2-end, bats, integration]}
    - {get: bosh-cpi-src,           trigger: false, resource: bosh-cpi-src-in,        passed: [end-2-end, bats, integration]}
    - {get: release-version-semver, trigger: false, params: {bump: major}}
    - {get: bosh-cli,               trigger: false}
  - task: promote
    file: bosh-cpi-src/ci/tasks/promote-candidate.yml
    params:
      ALICLOUD_ACCESS_KEY_ID:     {{alicloud_access_key__primary}}
      ALICLOUD_ACCESS_KEY_SECRET: {{alicloud_secret_key__primary}}
  - put: bosh-cpi-src-out
    params: {repository: promoted/repo, rebase: true, tag_prefix: "v", tag: promoted/integer_version}
  - put: release-version-semver
    params: {file: release-version-semver/number}


resource_types:
  - name: terraform_type
    type: docker-image
    source:
      repository: ljfranklin/terraform-resource
      tag: latest

resources:
  - name: one-day
    type: time
    source: {interval: 24h}
  - name: bosh-cpi-dev-artifacts
    type: s3
    source:
      regexp: bosh-alicloud-cpi-(\d+\.\d+\.\d+)\.tgz
      bucket:            {{bosh_cpi_release_bucket}}
      region:            {{bosh_cpi_release_region}}
      access_key_id:     {{bosh_cpi_release_access_key}}
      secret_access_key: {{bosh_cpi_release_secret_key}}
      endpoint:          oss-((bosh_cpi_release_region)).aliyuncs.com
  - name: bosh-cpi-src-in
    type: git
    source:
      uri: https://github.com/cloudfoundry/bosh-alicloud-cpi-release.git
      branch: master
      ignore_paths:
        - .final_builds/**/*.yml
        - releases/**/*.yml
        - CHANGELOG.md
  - name: bosh-cpi-src-out
    type: git
    source:
      uri: git@github.com:cloudfoundry/bosh-alicloud-cpi-release.git
      branch: master
      private_key: {{github_bosh-alicloud-cpi-release_private-key}}
  - name: version-semver
    type: semver
    source:
      key:               current-version
      bucket:            {{bosh_cpi_release_bucket}}
      region:            {{bosh_cpi_release_region}}
      access_key_id:     {{bosh_cpi_release_access_key}}
      secret_access_key: {{bosh_cpi_release_secret_key}}
      endpoint:          oss-((bosh_cpi_release_region)).aliyuncs.com
  - name: release-version-semver
    type: semver
    source:
      key:               release-current-version
      bucket:            {{bosh_cpi_release_bucket}}
      region:            {{bosh_cpi_release_region}}
      access_key_id:     {{bosh_cpi_release_access_key}}
      secret_access_key: {{bosh_cpi_release_secret_key}}
      endpoint:          oss-((bosh_cpi_release_region)).aliyuncs.com
  - name: bosh-cli
    type: github-release
    check_every: 1h
    source:
      owner: cloudfoundry
      repository: bosh-cli
      globs:
        - bosh-cli-*-linux-amd64
  - name: pipelines
    type: git
    source:
      uri: https://github.com/cloudfoundry-incubator/bosh-cpi-certification
      branch: master
  - name: bosh-release
    type: bosh-io-release
    source:
      repository: cloudfoundry/bosh
  - name: ubuntu-noble-stemcell
    type: bosh-io-stemcell
    source:
      name: bosh-alicloud-kvm-ubuntu-noble
      force_regular: true
      tarball: true
  - name: ubuntu-noble-light-stemcell
    type: bosh-io-stemcell
    source:
      name: bosh-alicloud-kvm-ubuntu-noble
  - name: bats
    type: git
    source:
      uri: https://github.com/cloudfoundry/bosh-acceptance-tests
      branch: master

  # begin: repos for e2e bosh blobs
  - name: jq-blob
    type: git
    source:
      uri: https://github.com/archieves/jq-blob

  - name: bosh-deployment
    type: git
    source:
      uri: https://github.com/cloudfoundry/bosh-deployment
      branch: master

  - name: aliyun-cli
    type: s3
    source:
      access_key_id: {{aliyun_cli_access_key}}
      secret_access_key: {{aliyun_cli_secret_key}}
      bucket: {{aliyun_cli_bucket}}
      regexp: .*-cli-linux-3\.0\.(\d+)-amd64\.tgz
      region_name: {{aliyun_cli_region}}
      endpoint: oss-((aliyun_cli_region)).aliyuncs.com
